<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hantoor Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="images/hantoor-logo (English).png" alt="Hantoor Logo (English)" class="logo">
        <h1>Coming Soon</h1>
        <div id="countdown">
            <div class="time-unit">
                <span id="days"></span>
                <div class="label">Days</div>
            </div>
            <div class="time-unit">
                <span id="hours"></span>
                <div class="label">Hours</div>
            </div>
            <div class="time-unit">
                <span id="minutes"></span>
                <div class="label">Minutes</div>
            </div>
            <div class="time-unit">
                <span id="seconds"></span>
                <div class="label">Seconds</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
